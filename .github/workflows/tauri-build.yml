name: Build Tauri binaries

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: linux
            platform: ubuntu-22.04
            artifact: linux-x64
            args: ""
          - name: Linux ARM64
            os: linux
            platform: ubuntu-22.04-arm
            artifact: linux-arm64
            args: ""
          - name: Windows x64
            os: windows
            platform: windows-latest
            artifact: windows-x64
            args: ""
          - name: Windows ARM64
            os: windows
            platform: windows-11-arm
            artifact: windows-arm64
            args: ""
          - name: macOS Apple Silicon
            os: macos
            platform: macos-15
            artifact: macos-aarch64
            args: ""
          - name: macOS Intel
            os: macos
            platform: macos-15-intel
            artifact: macos-x86_64
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        with:
          args: ${{ matrix.args }}

      - name: Build Windows portable executable
        if: matrix.os == 'windows'
        run: npx tauri build --no-bundle --ci

      - name: Prepare Windows portable executable
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $portableDir = "dist-portable"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          $exe = @(
            Get-ChildItem -Path "src-tauri/target/release" -Filter "lanzou-tauri.exe" -File -ErrorAction SilentlyContinue
            Get-ChildItem -Path "src-tauri/target/*/release" -Filter "lanzou-tauri.exe" -File -ErrorAction SilentlyContinue
          ) | Select-Object -First 1

          if (-not $exe) {
            throw "Portable executable not found"
          }

          Copy-Item -LiteralPath $exe.FullName -Destination "$portableDir/Lanzou-Downloader-${{ matrix.artifact }}-portable.exe" -Force

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**

      - name: Upload Windows portable executable
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.artifact }}-portable
          if-no-files-found: error
          path: dist-portable/*.exe
