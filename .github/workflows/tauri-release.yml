name: Release Tauri binaries

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
          - name: Windows x64
            platform: windows-latest
            args: ""
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Lanzou Downloader ${{ github.ref_name }}"
          releaseBody: "Cross-platform Tauri builds for Lanzou Downloader."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          assetNamePattern: "[name]-[version]-[platform]-[arch][_setup][ext]"
