name: Release Tauri binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish, for example v2.0.1"
        required: true
        type: string
      publish_existing_draft:
        description: "Publish the existing draft for this tag without rebuilding assets"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  changelog:
    name: Generate Release Changelog
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.publish_existing_draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      body: ${{ steps.release-notes.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Generate changelog
        id: release-notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          generated_notes="$(mktemp)"
          generated_notes_error="$(mktemp)"
          commit_notes="$(mktemp)"
          release_body="$(mktemp)"

          if ! gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" \
            -f configuration_file_path=".github/release.yml" \
            --jq ".body" > "${generated_notes}" 2> "${generated_notes_error}"; then
            echo "GitHub generated release notes failed, using commit changelog fallback." >&2
            cat "${generated_notes_error}" >&2
            echo "GitHub generated release notes were unavailable for this run." > "${generated_notes}"
          fi

          previous_tag="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
          if [ -n "${previous_tag}" ]; then
            git log --no-merges --pretty=format:"- %s (%h)" "${previous_tag}..HEAD" > "${commit_notes}"
          else
            git log --no-merges --pretty=format:"- %s (%h)" HEAD > "${commit_notes}"
          fi

          {
            echo "Cross-platform Tauri builds for Lanzou Downloader."
            echo
            echo "## Downloads"
            echo
            echo "- Windows: use the \`*_setup.exe\` installer, \`.msi\`, or the \`*-portable.exe\` build."
            echo "- macOS: use the \`.dmg\` for your CPU architecture."
            echo "- Linux: use the \`.AppImage\`, \`.deb\`, or \`.rpm\` for your architecture."
            echo
            echo "## Changelog"
            echo
            cat "${generated_notes}"
            echo
            echo "## Commits"
            echo
            if [ -s "${commit_notes}" ]; then
              cat "${commit_notes}"
            else
              echo "- No code commits detected for this release."
            fi
          } > "${release_body}"

          delimiter="release_body_$(cat /proc/sys/kernel/random/uuid)"
          {
            echo "body<<${delimiter}"
            cat "${release_body}"
            echo "${delimiter}"
          } >> "${GITHUB_OUTPUT}"

  release:
    name: Release ${{ matrix.name }}
    needs: changelog
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.publish_existing_draft }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: linux
            platform: ubuntu-22.04
            artifact: linux-x64
            args: ""
          - name: Linux ARM64
            os: linux
            platform: ubuntu-22.04-arm
            artifact: linux-arm64
            args: ""
          - name: Windows x64
            os: windows
            platform: windows-latest
            artifact: windows-x64
            args: ""
          - name: Windows ARM64
            os: windows
            platform: windows-11-arm
            artifact: windows-arm64
            args: ""
          - name: macOS Apple Silicon
            os: macos
            platform: macos-15
            artifact: macos-aarch64
            args: ""
          - name: macOS Intel
            os: macos
            platform: macos-15-intel
            artifact: macos-x86_64
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        id: tauri
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "Lanzou Downloader ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: false
          retryAttempts: 2
          args: ${{ matrix.args }}
          assetNamePattern: "[name]-[version]-[platform]-[arch][_setup][ext]"

      - name: Build Windows portable executable
        if: matrix.os == 'windows'
        run: npx tauri build --no-bundle --ci

      - name: Upload Windows portable executable
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          APP_VERSION: ${{ steps.tauri.outputs.appVersion }}
          PORTABLE_TARGET: ${{ matrix.artifact }}
        run: |
          $portableDir = "dist-portable"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          $exe = @(
            Get-ChildItem -Path "src-tauri/target/release" -Filter "lanzou-tauri.exe" -File -ErrorAction SilentlyContinue
            Get-ChildItem -Path "src-tauri/target/*/release" -Filter "lanzou-tauri.exe" -File -ErrorAction SilentlyContinue
          ) | Select-Object -First 1

          if (-not $exe) {
            throw "Portable executable not found"
          }

          $version = $env:APP_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:RELEASE_TAG -replace '^v', ''
          }

          $portablePath = Join-Path $portableDir "Lanzou-Downloader-$version-$env:PORTABLE_TARGET-portable.exe"
          Copy-Item -LiteralPath $exe.FullName -Destination $portablePath -Force
          gh release upload $env:RELEASE_TAG $portablePath --repo $env:GITHUB_REPOSITORY --clobber

  publish:
    name: Publish GitHub Release
    needs: release
    if: ${{ always() && (needs.release.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.publish_existing_draft)) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq ".[] | select(.tag_name == \"${RELEASE_TAG}\") | .id" | head -n 1)"
          if [ -z "${release_id}" ]; then
            echo "No GitHub Release found for tag ${RELEASE_TAG}" >&2
            exit 1
          fi

          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" -F draft=false -F prerelease=false
